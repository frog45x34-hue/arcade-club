<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILVER ARCADE — Игровой Клуб</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e12;
  --bg2:#14141a;
  --bg3:#1a1a22;
  --s1:#202028;
  --s2:#28283a;
  --s3:#30304a;
  --accent:#c8b8f0;
  --accent2:#a090d8;
  --accent3:#7060b0;
  --silver:#e0d8f0;
  --silver2:#b8b0d0;
  --silver3:#806890;
  --green:#4cba7a;
  --red:#e05060;
  --gold:#d4b060;
  --text:#e8e4f4;
  --muted:#706880;
  --muted2:#908898;
  --border:rgba(200,184,240,0.1);
  --border2:rgba(200,184,240,0.22);
  --glow:0 0 24px rgba(200,184,240,0.18);
  --glow2:0 0 48px rgba(200,184,240,0.1);
  --rad:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:15px;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--accent3);border-radius:2px;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 900px 500px at 15% -10%,rgba(112,96,176,0.07) 0%,transparent 55%),
             radial-gradient(ellipse 700px 700px at 85% 110%,rgba(200,184,240,0.04) 0%,transparent 55%);
  pointer-events:none;z-index:0;}

/* ── TYPOGRAPHY ── */
h1,h2,h3,.title{font-family:'Syne',sans-serif;}
.mono{font-family:'Syne Mono',monospace;}

/* ══════════════════════════════
   AUTH
══════════════════════════════ */
#authScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.auth-deco{
  font-family:'Syne',sans-serif;
  font-size:clamp(2rem,6vw,4rem);font-weight:800;
  letter-spacing:-2px;margin-bottom:6px;
  background:linear-gradient(135deg,var(--silver) 0%,var(--accent2) 60%,var(--silver3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.auth-sub{color:var(--muted2);font-size:.8rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;}
.auth-card{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;padding:28px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6),var(--glow2);
}
.a-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:22px;}
.a-tab{
  flex:1;padding:9px;border:none;background:transparent;
  border-radius:8px;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;
  color:var(--muted);transition:all .2s;letter-spacing:1px;text-transform:uppercase;
}
.a-tab.on{background:var(--s2);color:var(--accent);}
.a-field{margin-bottom:13px;}
.a-lbl{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);margin-bottom:6px;}
.a-in{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;
}
.a-in:focus{border-color:var(--accent);}
.a-in::placeholder{color:var(--muted);}
.a-bonus{
  background:rgba(76,186,122,0.1);border:1px solid rgba(76,186,122,0.22);
  border-radius:9px;padding:9px 13px;font-size:.78rem;color:var(--green);
  text-align:center;margin-bottom:14px;
}
.btn-auth{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent3),var(--accent2));
  border:none;border-radius:11px;color:#fff;
  font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;
  cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s;
}
.btn-auth:hover{transform:translateY(-1px);box-shadow:var(--glow);}
.a-err{color:var(--red);font-size:.78rem;text-align:center;margin-top:9px;min-height:16px;font-weight:500;}

/* ══════════════════════════════
   ADMIN MODAL
══════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:8000;
  background:rgba(14,14,18,0.92);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;animation:fup .25s ease;}
.modal-box{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;padding:28px;width:100%;max-width:440px;
  box-shadow:0 24px 60px rgba(0,0,0,0.7);
}
.modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.modal-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;}
.modal-close:hover{color:var(--red);}
.admin-section{margin-bottom:18px;}
.admin-section label{display:block;font-size:.75rem;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-weight:600;}
.admin-section input,.admin-section select{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:9px;padding:10px 13px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;
}
.admin-section select option{background:var(--bg);}
.btn-admin{
  width:100%;padding:12px;background:linear-gradient(135deg,var(--accent3),var(--accent));
  border:none;border-radius:10px;color:#fff;
  font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;
  cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;margin-top:4px;
}
.btn-admin:hover{box-shadow:var(--glow);}
.btn-admin.danger{background:linear-gradient(135deg,#7a1520,var(--red));}
.admin-msg{font-size:.8rem;text-align:center;margin-top:8px;min-height:18px;color:var(--green);font-weight:600;}

/* ══════════════════════════════
   GIVE MODAL
══════════════════════════════ */
#giveModal .modal-box{text-align:center;}
.give-icon{font-size:3.5rem;margin-bottom:10px;animation:bob 1s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.give-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:6px;}
.give-desc{color:var(--muted2);font-size:.85rem;line-height:1.6;margin-bottom:14px;}
.give-amt{font-family:'Syne Mono',monospace;font-size:2.2rem;font-weight:700;color:var(--silver);margin:10px 0;}
.btn-claim{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent3),var(--accent2));
  border:none;border-radius:11px;color:#fff;
  font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;
  cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s;
}
.btn-claim:hover{box-shadow:var(--glow);}

/* ══════════════════════════════
   AVATAR MODAL
══════════════════════════════ */
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0;}
.av-opt{
  aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;cursor:pointer;border:2px solid transparent;transition:all .2s;
  background:var(--s1);
}
.av-opt:hover{border-color:var(--accent);}
.av-opt.sel{border-color:var(--accent);box-shadow:0 0 12px rgba(200,184,240,0.3);}
.av-upload{
  background:var(--s1);border:1px dashed var(--border2);border-radius:10px;
  padding:14px;text-align:center;cursor:pointer;transition:all .2s;margin-top:8px;
  font-size:.82rem;color:var(--muted2);
}
.av-upload:hover{border-color:var(--accent);color:var(--accent);}
.av-preview{
  width:70px;height:70px;border-radius:50%;margin:10px auto;
  border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;
  font-size:2rem;overflow:hidden;background:var(--s1);
}
.av-preview img{width:100%;height:100%;object-fit:cover;}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
header{
  position:sticky;top:0;z-index:500;
  background:rgba(14,14,18,0.94);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:56px;padding:0 16px;
  display:flex;align-items:center;gap:12px;
}
.h-logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;
  letter-spacing:-0.5px;color:var(--silver);white-space:nowrap;
}
.h-logo span{color:var(--accent2);}
.h-spacer{flex:1;}
.h-bal{
  background:var(--s1);border:1px solid var(--border);
  border-radius:9px;padding:6px 12px;
  font-family:'Syne Mono',monospace;font-size:.85rem;
  color:var(--silver);white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.h-bal .coin{color:var(--accent);}
.h-avatar{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--border2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;background:var(--s1);overflow:hidden;
  transition:border-color .2s;flex-shrink:0;
}
.h-avatar:hover{border-color:var(--accent);}
.h-avatar img{width:100%;height:100%;object-fit:cover;}
.btn-hdr{
  background:transparent;border:1px solid var(--border);
  border-radius:8px;padding:6px 11px;color:var(--muted2);
  font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap;
}
.btn-hdr:hover{border-color:var(--red);color:var(--red);}

/* ══════════════════════════════
   BOTTOM NAV
══════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:rgba(14,14,18,0.97);border-top:1px solid var(--border);
  display:flex;height:56px;
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.62rem;
  font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .2s;
}
.bnav-btn:hover,.bnav-btn.on{color:var(--accent);}
.bnav-btn .ic{font-size:1.2rem;}

/* ══════════════════════════════
   PAGES
══════════════════════════════ */
main{padding:16px 16px 72px;position:relative;z-index:1;min-height:calc(100vh - 56px);}
.page{display:none;}
.page.on{display:block;animation:fup .25s ease;}
@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fup2{from{opacity:0}to{opacity:1}}

/* ══════════════════════════════
   HOME
══════════════════════════════ */
.home-hero{
  padding:24px 0 20px;text-align:center;
}
.home-hero h1{
  font-family:'Syne',sans-serif;font-size:clamp(1.6rem,5vw,2.8rem);
  font-weight:800;letter-spacing:-1px;
  color:var(--silver);line-height:1.1;margin-bottom:6px;
}
.home-hero h1 span{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.home-hero p{color:var(--muted2);font-size:.85rem;letter-spacing:1px;}
.stats-strip{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:8px;margin:16px 0 24px;
}
.stat-chip{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--rad);padding:14px 10px;text-align:center;
}
.sc-v{font-family:'Syne Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--accent);}
.sc-l{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.section-head{
  font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;
  color:var(--silver);margin-bottom:12px;letter-spacing:-.3px;
  display:flex;align-items:center;gap:8px;
}
.section-head small{font-size:.72rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:.5px;}

/* ── GAME GRID ── */
.game-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:10px;margin-bottom:24px;
}
@media(min-width:480px){.game-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:720px){.game-grid{grid-template-columns:repeat(4,1fr);}}
.game-tile{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--rad);padding:16px 10px;
  text-align:center;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.game-tile::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,184,240,0.04),transparent);
  opacity:0;transition:opacity .2s;
}
.game-tile:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--glow2);}
.game-tile:hover::before{opacity:1;}
.game-tile.new::after{
  content:'NEW';position:absolute;top:8px;right:8px;
  background:var(--accent3);color:#fff;font-size:.55rem;font-weight:800;
  padding:2px 6px;border-radius:4px;letter-spacing:1px;font-family:'Syne',sans-serif;
}
.gt-icon{font-size:2rem;margin-bottom:8px;}
.gt-name{font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;color:var(--text);letter-spacing:.3px;text-transform:uppercase;}
.gt-tag{font-size:.65rem;color:var(--accent3);margin-top:3px;font-weight:500;}

/* ══════════════════════════════
   GAME SCREEN
══════════════════════════════ */
.game-back{
  display:flex;align-items:center;gap:8px;
  background:none;border:none;color:var(--muted2);
  font-family:'DM Sans',sans-serif;font-size:.85rem;
  cursor:pointer;padding:0;margin-bottom:16px;transition:color .2s;
}
.game-back:hover{color:var(--accent);}
.game-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:20px;padding:20px;
  max-width:700px;margin:0 auto;
}
.game-title{
  font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;
  color:var(--silver);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}

/* ── BET BAR ── */
.bet-bar{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:11px;padding:12px 14px;
  display:flex;align-items:center;gap:9px;flex-wrap:wrap;
  margin-bottom:14px;
}
.b-lbl{font-size:.7rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1.2px;}
.b-in{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;
  color:var(--accent);font-family:'Syne Mono',monospace;
  font-size:.95rem;font-weight:700;width:140px;outline:none;
  transition:border-color .2s;
}
.b-in:focus{border-color:var(--accent);}
.presets{display:flex;gap:5px;flex-wrap:wrap;}
.pre{
  background:rgba(200,184,240,0.06);border:1px solid var(--border);
  border-radius:7px;padding:6px 11px;color:var(--accent3);
  cursor:pointer;font-size:.75rem;font-weight:700;transition:all .15s;
  font-family:'Syne Mono',monospace;
}
.pre:hover{background:rgba(200,184,240,0.15);border-color:var(--border2);color:var(--accent);}
.pre.all{border-color:rgba(224,80,96,0.3);color:var(--red);}
.pre.all:hover{background:rgba(224,80,96,0.12);border-color:var(--red);}
.pre.hf{border-color:rgba(76,186,122,0.25);color:var(--green);}
.pre.hf:hover{background:rgba(76,186,122,0.1);}

/* ── ACTION ROW ── */
.act-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px;}
.btn-play{
  background:linear-gradient(135deg,var(--accent3),var(--accent2));
  border:none;border-radius:10px;padding:12px 24px;color:#fff;
  font-family:'Syne',sans-serif;font-size:.82rem;font-weight:800;
  cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;
  transition:all .2s;flex:1;min-width:100px;
}
.btn-play:hover{transform:translateY(-1px);box-shadow:var(--glow);}
.btn-play:active{transform:scale(.97);}
.btn-play:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-sec{
  background:transparent;border:1px solid var(--border2);
  border-radius:10px;padding:12px 18px;color:var(--accent3);
  font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;
  cursor:pointer;letter-spacing:1px;transition:all .2s;
}
.btn-sec:hover{background:rgba(200,184,240,0.07);color:var(--accent);}
.btn-sec:disabled{opacity:.35;cursor:not-allowed;}

/* ── RESULT ── */
.result{
  margin-top:14px;border-radius:11px;padding:14px;
  text-align:center;font-size:1rem;font-weight:700;display:none;
}
.result.win{background:rgba(76,186,122,0.1);border:1px solid rgba(76,186,122,0.25);color:var(--green);display:block;animation:pop .35s ease;}
.result.lose{background:rgba(224,80,96,0.08);border:1px solid rgba(224,80,96,0.2);color:var(--red);display:block;}
.result.push{background:rgba(200,184,240,0.07);border:1px solid var(--border2);color:var(--accent);display:block;}
@keyframes pop{0%{transform:scale(.95)}60%{transform:scale(1.03)}100%{transform:scale(1)}}

/* ── HISTORY CHIPS ── */
.hist{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
.hc{padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:700;font-family:'Syne Mono',monospace;}
.hc.w{background:rgba(76,186,122,0.12);color:var(--green);}
.hc.l{background:rgba(224,80,96,0.1);color:var(--red);}
.hc.p{background:rgba(200,184,240,0.08);color:var(--accent3);}

/* ── SLOTS ── */
.slot-row{display:flex;justify-content:center;gap:6px;margin:18px 0;}
.reel{
  width:70px;height:88px;background:var(--bg2);
  border:1px solid var(--border2);border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.6rem;transition:all .2s;
}
.reel.spin{animation:rsp .1s linear infinite;}
@keyframes rsp{50%{transform:scaleY(.8);opacity:.6}}
.reel.lit{border-color:var(--accent);box-shadow:0 0 14px rgba(200,184,240,0.25);}

/* ── ROULETTE ── */
.rou-disc{
  width:160px;height:160px;border-radius:50%;
  background:conic-gradient(
    #7a1520 0 9.7deg,#1a1a22 9.7deg 19.4deg,#7a1520 19.4deg 29.1deg,
    #1a1a22 29.1deg 38.8deg,#7a1520 38.8deg 48.5deg,#1a1a22 48.5deg 58.2deg,
    #145a32 58.2deg 67.9deg,#1a1a22 67.9deg 77.6deg,#7a1520 77.6deg 87.3deg,
    #1a1a22 87.3deg 97deg,#7a1520 97deg 106.7deg,#1a1a22 106.7deg 116.4deg,
    #7a1520 116.4deg 126.1deg,#1a1a22 126.1deg 135.8deg,#7a1520 135.8deg 145.5deg,
    #1a1a22 145.5deg 155.2deg,#7a1520 155.2deg 164.9deg,#1a1a22 164.9deg 174.6deg,
    #7a1520 174.6deg 184.3deg,#1a1a22 184.3deg 194deg,#7a1520 194deg 203.7deg,
    #1a1a22 203.7deg 213.4deg,#7a1520 213.4deg 223.1deg,#1a1a22 223.1deg 232.8deg,
    #7a1520 232.8deg 242.5deg,#1a1a22 242.5deg 252.2deg,#7a1520 252.2deg 261.9deg,
    #1a1a22 261.9deg 271.6deg,#7a1520 271.6deg 281.3deg,#1a1a22 281.3deg 291deg,
    #7a1520 291deg 300.7deg,#1a1a22 300.7deg 310.4deg,#7a1520 310.4deg 320.1deg,
    #1a1a22 320.1deg 329.8deg,#7a1520 329.8deg 339.5deg,#1a1a22 339.5deg 349.2deg,
    #145a32 349.2deg 360deg
  );
  border:2px solid var(--border2);
  transition:transform 3.5s cubic-bezier(.15,.65,.1,.99);
  margin:0 auto 10px;
}
.rou-num{font-family:'Syne Mono',monospace;font-size:2.8rem;font-weight:700;text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center;}
.rbet-g{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.rb{
  background:var(--s2);border:1px solid var(--border);
  border-radius:9px;padding:9px 5px;text-align:center;cursor:pointer;
  font-size:.78rem;font-weight:600;color:var(--text);transition:all .2s;
}
.rb:hover,.rb.on{border-color:var(--accent);background:rgba(200,184,240,0.08);color:var(--accent);}
.rb.r{color:var(--red);border-color:rgba(224,80,96,0.2);}
.rb.r:hover,.rb.r.on{background:rgba(224,80,96,0.1);border-color:var(--red);}
.rb.g{color:var(--green);border-color:rgba(76,186,122,0.2);}

/* ── BJ CARDS ── */
.carea{display:flex;gap:6px;flex-wrap:wrap;min-height:70px;margin:7px 0;}
.card{
  width:48px;height:70px;background:#f0ecf8;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:900;color:#1a1522;
  box-shadow:0 3px 10px rgba(0,0,0,0.5);flex-shrink:0;animation:cf .25s ease;
}
.card.r{color:#c0203a;}
.card.bk{background:linear-gradient(135deg,var(--bg2),var(--s2));border:1px solid var(--border);color:var(--accent3);}
@keyframes cf{from{transform:rotateY(90deg)}to{transform:rotateY(0)}}
